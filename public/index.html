<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>아침 투자 브리핑</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">

  <div id="updateTime" class="update-time"></div>

  <div class="briefing-badge">
    <span class="live-dot">LIVE</span>
    <span class="badge-text">Morning Briefing v1.0</span>
  </div>
</div>
	<button id="refreshBtn">새로고침</button>

      </div>

    <section class="summary-grid">

      <section id="topPicks" class="summary-card"></section>
    </section>

    <main id="dashboard" class="dashboard"></main>

<footer class="footer">
  Morning Investment Briefing<br />

 </div>
